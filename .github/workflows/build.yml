name: build-runtimes

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "python-runtime/**"
      - "shell-runtime/**"
      - "node-runtime/**"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "python-runtime/**"
      - "shell-runtime/**"
      - "node-runtime/**"
      - ".github/workflows/build.yml"

# Cancel in-flight runs when a new commit lands on the same ref.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: merchantprotocol

jobs:
  changes:
    # Detect which runtime subdirs actually changed so we only build those legs.
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python-runtime:
              - 'python-runtime/**'
              - '.github/workflows/build.yml'
            shell-runtime:
              - 'shell-runtime/**'
              - '.github/workflows/build.yml'
            node-runtime:
              - 'node-runtime/**'
              - '.github/workflows/build.yml'

      - id: set
        run: |
          runtimes=()
          if [ "${{ steps.filter.outputs.python-runtime }}" = "true" ]; then runtimes+=("python-runtime"); fi
          if [ "${{ steps.filter.outputs.shell-runtime }}"  = "true" ]; then runtimes+=("shell-runtime");  fi
          if [ "${{ steps.filter.outputs.node-runtime }}"   = "true" ]; then runtimes+=("node-runtime");   fi
          # On tag pushes always build everything so the release is coherent.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            runtimes=("python-runtime" "shell-runtime" "node-runtime")
          fi
          if [ ${#runtimes[@]} -eq 0 ]; then
            echo "matrix={\"runtime\":[]}" >> "$GITHUB_OUTPUT"
          else
            json=$(printf '"%s",' "${runtimes[@]}")
            json="[${json%,}]"
            echo "matrix={\"runtime\":${json}}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: changes
    if: fromJson(needs.changes.outputs.matrix).runtime != null && toJson(fromJson(needs.changes.outputs.matrix).runtime) != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/sulla-${{ matrix.runtime }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr,prefix=pr-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
          flavor: |
            latest=auto

      - name: Build and push ${{ matrix.runtime }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.runtime }}
          file: ${{ matrix.runtime }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.runtime }}
          cache-to: type=gha,scope=${{ matrix.runtime }},mode=max
